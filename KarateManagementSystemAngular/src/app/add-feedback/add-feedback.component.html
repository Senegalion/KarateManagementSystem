<div>
  <h2>Add Feedback</h2>
  <form (ngSubmit)="onSubmit()">
    <div>
      <label for="sessionId">Session ID:</label>
      <input type="number" id="sessionId" [(ngModel)]="sessionId" name="sessionId" required>
    </div>
    <div>
      <label for="userId">User ID:</label>
      <input type="number" id="userId" [(ngModel)]="userId" name="userId" required>
    </div>
    <div>
      <label for="feedback">Feedback:</label>
      <textarea id="feedback" [(ngModel)]="feedback.comment" name="feedback" required></textarea>
    </div>
    <button type="submit">Add Feedback</button>
  </form>
</div>
