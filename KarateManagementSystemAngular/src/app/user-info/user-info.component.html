<div class="container">
  <h2>User Information</h2>
  <p *ngIf="user"><strong>Name:</strong> {{ user.name }}</p>
  <p *ngIf="user"><strong>Surname:</strong> {{ user.surname }}</p>
  <p *ngIf="user"><strong>Date of Birth:</strong> {{ user.dateOfBirth }}</p>
  <p *ngIf="user"><strong>Pesel:</strong> {{ user.pesel }}</p>
  <p *ngIf="user"><strong>Karate Rank:</strong> {{ user.karateRank }}</p>
  <p *ngIf="user"><strong>Email:</strong> {{ user.email }}</p>
</div>
