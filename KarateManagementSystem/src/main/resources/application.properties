spring.application.name=KarateManagementSystem

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.datasource.url = jdbc:postgresql://localhost:5432/karate_management_system
spring.datasource.username = postgres
spring.datasource.password = postgres

spring.datasource.testWhileIdle = true
spring.datasource.validationQuery = SELECT 1

# IMPORTANT: to use data.sql file has to be uncommented
spring.sql.init.mode = always

spring.jpa.show-sql = true

spring.jpa.hibernate.ddl-auto = update

spring.jpa.hibernate.naming-strategy = org.hibernate.cfg.ImprovedNamingStrategy

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# logging.level.org.springframework.web = trace
# logging.level.org.hibernate = trace

pl.dmcs.rkotas.jwtSecret = jwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKeyjwtSecretKey
pl.dmcs.rkotas.jwtExpiration = 3600
